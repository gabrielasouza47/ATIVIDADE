<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Jogo do Dado</title>

  <style>
    body {
        background-color: rgb(0, 0, 0);
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      color: aliceblue;
    }

    #dado {
      font-size: 100px;
      margin: 20px;
    }

    #resultado {
      font-size: 30px;
      color: rgb(99, 99, 99);
    }

    button {
      padding: 10px 20px;
      font-size: 20px;
      cursor: pointer;
    }
    .container{
        background-color: cornflowerblue;
        padding: 50px;
        border-radius: 20px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎲 Jogo: Rolar um Dado</h1>

  
  <div id="dado">⚀</div>

  
  <p id="resultado">Clique no botão</p>

  
  <button onclick="rolarDado()">Rolar Dado</button>
<br><br><br><br>
  <BUTton href="index.html">ir para o Jogo de achar palavra secreta</BUTton>
</div>
  <script>

    function rolarDado() {

      //esse codigo random é bem complicado
      let numero = Math.floor(Math.random() * 6) + 1;

      
      let dados = ["⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];

      
      document.getElementById("dado").innerText = dados[numero - 1];

      
      document.getElementById("resultado").innerText =
        "Você tirou o número " + numero;

    }

  </script>

</body>
</html>
